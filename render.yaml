services:
  - type: web
    name: kidney-detection-backend
    runtime: python
    plan: free
    
    rootDir: backend
    
    buildCommand: |
      pip install --upgrade pip setuptools wheel && \
      pip install --no-cache-dir -r requirements-render.txt && \
      mkdir -p logs data/uploads saved_models && \
      python download_model.py && \
      chmod +x startup-final.sh
    
    startCommand: ./startup-final.sh
    
    healthCheckPath: /health
    
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PORT
        value: "8000"

  - type: web
    name: kidney-detection-frontend
    runtime: node
    plan: free
    
    rootDir: frontend
    
    buildCommand: npm install && npm run build
    
    startCommand: npm run preview -- --host 0.0.0.0 --port 3000
    
    envVars:
      - key: VITE_API_URL
        value: "https://kidney-detection-backend.onrender.com"
      - key: PORT
        value: "3000"
